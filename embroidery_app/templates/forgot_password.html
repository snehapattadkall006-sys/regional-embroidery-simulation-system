{% extends 'base.html' %}
{% block title %}Forgot Password — RESS{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left-bg"></div>
    <a href="{{ url_for('welcome') }}" class="auth-logo" style="position:relative;z-index:1">✦ RESS</a>
    <div class="auth-emblem" style="position:relative;z-index:1">
      <div class="er er1"></div><div class="er er2"></div><div class="er er3"></div>
      <div class="emblem-dot"></div>
    </div>
    <h2 style="position:relative;z-index:1">Password Recovery</h2>
    <p style="position:relative;z-index:1">Enter your registered email to reset your password</p>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h3 class="auth-box-title">Forgot Password</h3>
      <p class="auth-box-sub">We'll verify your email and let you reset it</p>
      <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
        <div class="ff">
          <label class="fl"><i class="fas fa-envelope"></i> Registered Email</label>
          <input class="fi" type="email" name="email" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn-sub"><i class="fas fa-paper-plane"></i> Verify Email</button>
      </form>
      <p class="auth-switch"><a href="{{ url_for('login') }}">← Back to Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
