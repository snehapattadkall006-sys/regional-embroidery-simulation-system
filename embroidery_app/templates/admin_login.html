{% extends 'base.html' %}
{% block title %}Admin Login — RESS{% endblock %}
{% block content %}
<div class="auth-page admin-auth">
  <div class="auth-left admin-left">
    <div class="auth-left-bg"></div>
    <a href="{{ url_for('welcome') }}" class="auth-logo" style="position:relative;z-index:1">✦ RESS Admin</a>
    <div class="admin-shield" style="position:relative;z-index:1"><i class="fas fa-shield-alt"></i></div>
    <h2 style="position:relative;z-index:1">Administration Panel</h2>
    <p style="position:relative;z-index:1">Restricted access — authorised personnel only</p>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h3 class="auth-box-title">Admin Login</h3>
      <p class="auth-box-sub">Enter admin credentials to continue</p>
      <form method="POST" action="{{ url_for('admin_login') }}" class="auth-form">
        <div class="ff">
          <label class="fl"><i class="fas fa-envelope"></i> Admin Email</label>
          <input class="fi" type="email" name="email" placeholder="admin@embroidery.com" required>
        </div>
        <div class="ff">
          <label class="fl"><i class="fas fa-lock"></i> Password</label>
          <div class="pw-wrap">
            <input class="fi" type="password" id="apw" name="password" placeholder="••••••••" required>
            <span class="pw-eye" onclick="togglePass('apw')"><i class="fas fa-eye"></i></span>
          </div>
        </div>
        <button type="submit" class="btn-sub" style="background:var(--gold-dk)"><i class="fas fa-sign-in-alt"></i> Admin Login</button>
      </form>
      <p class="auth-switch"><a href="{{ url_for('login') }}">← User Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
