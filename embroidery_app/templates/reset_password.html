{% extends 'base.html' %}
{% block title %}Reset Password — RESS{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left-bg"></div>
    <a href="{{ url_for('welcome') }}" class="auth-logo" style="position:relative;z-index:1">✦ RESS</a>
    <div class="auth-emblem" style="position:relative;z-index:1">
      <div class="er er1"></div><div class="er er2"></div><div class="er er3"></div>
      <div class="emblem-dot"></div>
    </div>
    <h2 style="position:relative;z-index:1">Set New Password</h2>
    <p style="position:relative;z-index:1">Choose a strong new password for your account</p>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h3 class="auth-box-title">Reset Password</h3>
      <p class="auth-box-sub">Enter your new password below</p>
      <form method="POST" action="{{ url_for('reset_password') }}" class="auth-form">
        <div class="ff">
          <label class="fl"><i class="fas fa-lock"></i> New Password</label>
          <div class="pw-wrap">
            <input class="fi" type="password" id="npw" name="new_password" placeholder="Min 6 chars, upper, lower, number" required>
            <span class="pw-eye" onclick="togglePass('npw')"><i class="fas fa-eye"></i></span>
          </div>
        </div>
        <div class="ff">
          <label class="fl"><i class="fas fa-lock"></i> Confirm New Password</label>
          <div class="pw-wrap">
            <input class="fi" type="password" id="cpw" name="confirm_password" placeholder="Repeat new password" required>
            <span class="pw-eye" onclick="togglePass('cpw')"><i class="fas fa-eye"></i></span>
          </div>
        </div>
        <button type="submit" class="btn-sub"><i class="fas fa-save"></i> Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
